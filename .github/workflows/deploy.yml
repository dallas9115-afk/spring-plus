name: Deploy to EC2 via Docker

on:
  push:
    branches:
      - main
      - feat/advanced-features-and-deployment
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/expert-todo-backend:latest

      - name: Prepare deployment files
        run: |
          mkdir -p deploy-files
          echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > deploy-files/.env
          echo "RDS_URL=${{ secrets.RDS_URL }}" >> deploy-files/.env
          echo "RDS_USERNAME=${{ secrets.RDS_USERNAME }}" >> deploy-files/.env
          echo "RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}" >> deploy-files/.env
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> deploy-files/.env
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> deploy-files/.env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> deploy-files/.env
          echo "S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}" >> deploy-files/.env
          echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> deploy-files/.env

      - name: Create prometheus config
        run: |
          cat > deploy-files/prometheus.yml << 'PROM_END'
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
          scrape_configs:
            - job_name: spring-plus-backend
              metrics_path: /actuator/prometheus
              static_configs:
                - targets:
                    - spring-app:8080
          PROM_END

      - name: Create docker-compose config
        run: |
          cat > deploy-files/docker-compose.yml << COMPOSE_END
          version: "3.8"
          services:
            spring-app:
              image: ${{ secrets.DOCKER_USERNAME }}/expert-todo-backend:latest
              container_name: spring-app
              ports:
                - "8080:8080"
              env_file:
                - .env
              networks:
                - app-network
              restart: always
            prometheus:
              image: prom/prometheus
              container_name: prometheus
              volumes:
                - ./prometheus.yml:/etc/prometheus/prometheus.yml
              ports:
                - "9090:9090"
              networks:
                - app-network
              restart: always
            grafana:
              image: grafana/grafana
              container_name: grafana
              ports:
                - "3000:3000"
              networks:
                - app-network
              restart: always
          networks:
            app-network:
              driver: bridge
          COMPOSE_END

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy-files/.env,deploy-files/prometheus.yml,deploy-files/docker-compose.yml"
          target: "~/app"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            sudo docker-compose pull
            sudo docker-compose up -d
            sudo docker image prune -f
