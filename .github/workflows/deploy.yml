name: Deploy to EC2 via Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/expert-todo-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            # Check if Docker is installed, install if not
            if ! command -v docker &> /dev/null
            then
                echo "Docker not found. Installing..."
                sudo apt-get update
                sudo apt-get install -y docker.io
                sudo systemctl start docker
                sudo systemctl enable docker
                sudo usermod -aG docker ${{ secrets.USERNAME }}
                echo "Please reboot or re-login if Docker permission fails"
            fi
            
            # Pull the latest image
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/expert-todo-backend:latest
            
            # Stop existing container if it exists
            sudo docker stop spring-app || true
            sudo docker rm spring-app || true
            
            # Run the new container, passing in the DB/AWS secrets
            sudo docker run -d --name spring-app \
              -p 8080:8080 \
              -e RDS_URL='${{ secrets.RDS_URL }}' \
              -e RDS_USERNAME='${{ secrets.RDS_USERNAME }}' \
              -e RDS_PASSWORD='${{ secrets.RDS_PASSWORD }}' \
              -e AWS_REGION='${{ secrets.AWS_REGION }}' \
              -e AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}' \
              -e AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
              -e S3_BUCKET_NAME='${{ secrets.S3_BUCKET_NAME }}' \
              -e JWT_SECRET_KEY='${{ secrets.JWT_SECRET_KEY }}' \
              ${{ secrets.DOCKER_USERNAME }}/expert-todo-backend:latest
